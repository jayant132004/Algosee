<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - SortMentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(229, 231, 235, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 via-purple-50 to-blue-100 p-4 py-8">

    <div class="glass-card w-full max-w-md p-8 md:p-10 relative overflow-hidden">
        <!-- Decorative blobs -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="relative z-10 text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-blue-200">
                <span class="material-icons text-white text-3xl">person_add</span>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Join SortMentor</h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">Start mastering algorithms today</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mt-4 p-3 rounded-lg text-sm font-medium {{ 'bg-red-100 text-red-700 border border-red-200' if category == 'danger' else 'bg-green-100 text-green-700 border border-green-200' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form action="/register" method="POST" class="relative z-10 space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5" for="username">Username</label>
                <div class="relative">
                    <span class="material-icons absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm">person</span>
                    <input type="text" id="username" name="username" placeholder="AlexStudent" class="pl-10 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5" for="email">Email address</label>
                <div class="relative">
                    <span class="material-icons absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm">email</span>
                    <input type="email" id="email" name="email" placeholder="alex@example.com" class="pl-10 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5" for="password">Password</label>
                <div class="relative">
                    <span class="material-icons absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm">lock</span>
                    <input type="password" id="password" name="password" placeholder="••••••••" class="pl-10 w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 mt-2">
                Create Account
            </button>
        </form>

        <div class="relative z-10 mt-8 text-center text-sm border-t border-gray-100 pt-6">
            <p class="text-gray-600 font-medium">Already have an account? <a href="{{ url_for('login') }}" class="font-bold text-blue-600 hover:text-blue-500 transition-all hover:underline">Log in instead</a></p>
        </div>
    </div>

</body>
</html>
